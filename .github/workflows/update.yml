name: Update svodka

on:
  schedule:
    # 05:00 UTC ежедневно (~08:00 Москва, 09:00 Тбилиси).
    # Не ставь ровно на :00 часа без причины — в пик возможны задержки.
    # Чаще: '0 */6 * * *' (каждые 6 часов). Реже — измени строку ниже.
    - cron: '0 5 * * *'
  workflow_dispatch:        # позволяет запускать вручную из вкладки Actions

permissions:
  contents: write           # нужно, чтобы коммитить обновлённый svodka.json

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install

      - name: Build digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node build.mjs

      - name: Commit updated digest
        run: |
          git config user.name "svodka-bot"
          git config user.email "actions@users.noreply.github.com"
          git add svodka.json
          if git diff --staged --quiet; then
            echo "Изменений нет — коммит не нужен."
          else
            git commit -m "Update svodka $(date -u +%FT%TZ)"
            git push
          fi
