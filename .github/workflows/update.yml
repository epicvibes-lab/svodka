name: Update svodka

on:
  schedule:
    # 05:00 UTC ежедневно (~08:00 Москва, 09:00 Тбилиси).
    # Архив накопительный, поэтому запускать можно чаще без потери прошлых новостей:
    # каждые 6 часов — '0 */6 * * *', каждый час — '0 * * * *'. Время в UTC.
    - cron: '0 5 * * *'
  workflow_dispatch:        # позволяет запускать вручную из вкладки Actions

permissions:
  contents: write           # нужно, чтобы коммитить обновлённый архив svodka.json

# Защита от наложения запусков: если новый старт пришёл, пока идёт прошлый —
# он дождётся завершения. Так два прогона не перезапишут архив друг друга.
concurrency:
  group: svodka-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install

      - name: Build digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node build.mjs

      - name: Commit updated archive
        run: |
          git config user.name "svodka-bot"
          git config user.email "actions@users.noreply.github.com"
          git add svodka.json
          if git diff --staged --quiet; then
            echo "Новых новостей нет — коммит не нужен."
          else
            git commit -m "Update svodka archive $(date -u +%FT%TZ)"
            # На случай, если параллельный коммит успел уйти в ветку.
            git pull --rebase --autostash || true
            git push
          fi
