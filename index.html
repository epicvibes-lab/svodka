<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Сводка — утренний дайджест</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F5F1;
    --ink:#16181C;
    --ink-soft:#454a52;
    --line:#dcdAd2;
    --line-strong:#c4c1b6;
    --chip:#ecebe5;
    --accent:#1f3aff;
    --cat-mir:#1f6feb;
    --cat-pol:#b4690e;
    --cat-eco:#1a7f48;
    --cat-conf:#c2362f;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --serif:'Fraunces',Georgia,'Times New Roman',serif;
    --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  .wrap{max-width:720px;margin:0 auto;padding:0 22px 96px}

  /* ── Masthead ── */
  header.mast{
    padding:46px 0 22px;
    border-bottom:2px solid var(--ink);
    margin-bottom:4px;
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--ink-soft);
    display:flex;
    gap:10px;
    align-items:center;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block}
  .wordmark{
    font-family:var(--serif);
    font-weight:900;
    font-size:clamp(46px,13vw,86px);
    letter-spacing:-.02em;
    line-height:.92;
    margin:14px 0 4px;
  }
  .mast-meta{
    display:flex;
    flex-wrap:wrap;
    gap:6px 18px;
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
    margin-top:12px;
  }
  .mast-meta b{color:var(--ink);font-weight:600}

  /* ── States ── */
  .state{
    padding:64px 4px;
    font-family:var(--mono);
    font-size:13px;
    color:var(--ink-soft);
  }
  .state.err{color:var(--cat-conf)}
  .state code{background:var(--chip);padding:2px 6px;border-radius:4px}

  /* ── Story ── */
  .story{
    display:grid;
    grid-template-columns:46px 1fr;
    gap:0 18px;
    padding:26px 0;
    border-bottom:1px solid var(--line);
  }
  .story:last-child{border-bottom:none}
  .rank{
    font-family:var(--mono);
    font-size:13px;
    font-weight:600;
    color:var(--ink-soft);
    padding-top:4px;
  }
  .rank .tick{
    display:block;
    width:14px;height:3px;
    margin-top:8px;border-radius:2px;
    background:var(--c,var(--line-strong));
  }
  .body{min-width:0}
  .cat{
    font-family:var(--mono);
    font-size:11px;
    font-weight:600;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--c,var(--ink-soft));
  }
  h2.title{
    font-family:var(--serif);
    font-weight:600;
    font-size:clamp(21px,4.5vw,27px);
    line-height:1.2;
    letter-spacing:-.01em;
    margin:6px 0 8px;
  }
  .summary{
    font-size:15.5px;
    color:#23262c;
    margin:0 0 14px;
  }
  .foot{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:8px 14px;
    font-family:var(--mono);
    font-size:11.5px;
    color:var(--ink-soft);
  }
  .foot .src{color:var(--ink);font-weight:600}
  .foot .sep{width:3px;height:3px;border-radius:50%;background:var(--line-strong)}
  .prev{
    margin-top:13px;
    display:flex;
    gap:10px;
    align-items:baseline;
    padding:10px 13px;
    background:var(--chip);
    border-left:3px solid var(--c,var(--line-strong));
    border-radius:0 6px 6px 0;
    font-size:13px;
  }
  .prev .rel{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--c,var(--ink-soft));
    white-space:nowrap;
  }
  .prev a,.prev span.t{color:var(--ink-soft);text-decoration:none}
  .prev a:hover{color:var(--accent);text-decoration:underline}

  footer.foot-note{
    margin-top:40px;
    padding-top:18px;
    border-top:1px solid var(--line);
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-soft);
  }
  a{color:inherit}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:3px}
  @media (prefers-reduced-motion:no-preference){
    .story{animation:rise .5s cubic-bezier(.2,.7,.3,1) backwards}
    @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  }
  @media (max-width:480px){
    .story{grid-template-columns:30px 1fr;gap:0 12px}
    .wrap{padding:0 16px 72px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="mast">
    <div class="eyebrow"><span class="dot"></span> Утренняя сводка</div>
    <div class="wordmark">Сводка</div>
    <div class="mast-meta" id="meta"></div>
  </header>

  <main id="feed">
    <div class="state" id="loading">Загружаю свежий выпуск…</div>
  </main>

  <footer class="foot-note" id="footnote"></footer>
</div>

<script>
const CAT = {
  'Мир':        {v:'var(--cat-mir)'},
  'Политика':   {v:'var(--cat-pol)'},
  'Экономика':  {v:'var(--cat-eco)'},
  'Конфликты':  {v:'var(--cat-conf)'},
};
const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

function fmtDate(s){
  const d = new Date((s||'') + 'T00:00:00');
  if (isNaN(d)) return s || '';
  return `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}
function fmtUpdated(iso){
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return `${hh}:${mm}`;
}
function esc(t){
  return String(t ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(data){
  const items = Array.isArray(data.items) ? data.items : [];
  const ids = new Set(items.map(i => i.id));

  document.getElementById('meta').innerHTML =
    `<span>Выпуск <b>${esc(fmtDate(data.date))}</b></span>` +
    (data.updated ? `<span>Обновлено <b>${esc(fmtUpdated(data.updated))}</b></span>` : '') +
    `<span><b>${items.length}</b> ${items.length===1?'материал':'материалов'}</span>`;

  const feed = document.getElementById('feed');

  if (!items.length){
    feed.innerHTML = `<div class="state">Сегодняшний выпуск пуст. Загляните позже.</div>`;
    return;
  }

  feed.innerHTML = items.map((it, i) => {
    const c = CAT[it.category]?.v || 'var(--ink-soft)';
    const n = String(i+1).padStart(2,'0');

    let prevHtml = '';
    if (it.prev && it.prev.title){
      const rel = it.prev.relation || 'продолжение';
      const onPage = it.prev.id && ids.has(it.prev.id);
      const target = onPage
        ? `<a href="#${esc(it.prev.id)}">${esc(it.prev.title)}</a>`
        : `<span class="t">${esc(it.prev.title)}</span>`;
      const when = it.prev.date ? ` · ${esc(fmtDate(it.prev.date))}` : '';
      prevHtml = `<div class="prev" style="--c:${c}">
          <span class="rel">${esc(rel)}</span>
          <span>${target}${when}</span>
        </div>`;
    }

    return `<article class="story" id="${esc(it.id||('s'+i))}" style="animation-delay:${i*55}ms">
      <div class="rank">${n}<span class="tick" style="--c:${c}"></span></div>
      <div class="body">
        <div class="cat" style="--c:${c}">${esc(it.category||'Мир')}</div>
        <h2 class="title">${esc(it.title)}</h2>
        <p class="summary">${esc(it.summary)}</p>
        <div class="foot">
          <span class="src">${esc(it.source||'источник')}</span>
          <span class="sep"></span>
          <span>${esc(it.time_ago||'сегодня')}</span>
        </div>
        ${prevHtml}
      </div>
    </article>`;
  }).join('');

  document.getElementById('footnote').textContent =
    'Автоматический дайджест · отбор и связи событий — Claude Haiku · обновляется ежедневно.';
}

fetch('svodka.json', {cache:'no-store'})
  .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(render)
  .catch(err => {
    document.getElementById('feed').innerHTML =
      `<div class="state err">Не удалось загрузить <code>svodka.json</code> (${esc(err.message)}).<br>
       Проверьте, что файл лежит рядом с этой страницей и сборка прошла успешно.</div>`;
  });
</script>
</body>
</html>
